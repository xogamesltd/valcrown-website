<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ValCrown — Dashboard</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="img/favicon.svg">
<link rel="stylesheet" href="css/shared.css">
<style>
.dw{max-width:940px;margin:0 auto;padding:32px 20px 80px}
.dtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.dgreet{font-size:24px;font-weight:900;letter-spacing:-.5px}
.dsub{font-size:14px;color:var(--t2);margin-top:3px}
.dtop-btns{display:flex;gap:8px;flex-wrap:wrap}
.dbtn{padding:9px 18px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--f);border:none;transition:.15s;display:inline-flex;align-items:center;gap:7px;text-decoration:none}
.dbtn.p{background:linear-gradient(135deg,#7c6aff,#a89fff);color:#fff}
.dbtn.p:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,106,255,.35)}
.dbtn.g{background:var(--bg2);border:1px solid var(--b2);color:var(--t2)}
.dbtn.g:hover{color:var(--t1);border-color:var(--ac)}
.dbtn.r{background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.2);color:#ff4757}
.dbtn.r:hover{background:rgba(255,71,87,.15)}
.dtabs{display:flex;gap:3px;margin-bottom:24px;background:var(--bg1);border:1px solid var(--b1);border-radius:12px;padding:5px;overflow-x:auto}
.dtab{padding:9px 16px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;color:var(--t2);border:none;background:none;font-family:var(--f);transition:.15s;white-space:nowrap;flex-shrink:0}
.dtab.on{background:var(--bg3);color:var(--t1)}
.dtab:hover:not(.on){color:var(--t1)}
.dpanel{display:none}.dpanel.on{display:block}
.dc{background:var(--bg1);border:1px solid var(--b2);border-radius:16px;padding:22px;margin-bottom:14px}
.dc-h{font-size:12px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.subcard{position:relative;overflow:hidden;border-radius:16px;padding:26px;margin-bottom:14px;background:linear-gradient(135deg,rgba(124,106,255,.1),rgba(0,232,122,.04));border:1px solid rgba(124,106,255,.2)}
.subcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#7c6aff,#00e87a)}
.plan-row{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:18px}
.plan-name{font-size:26px;font-weight:900;letter-spacing:-.5px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:40px;font-size:11px;font-weight:700;margin-top:6px}
.badge.ok{background:rgba(0,232,122,.1);color:#00e87a;border:1px solid rgba(0,232,122,.2)}
.badge.exp{background:rgba(255,71,87,.1);color:#ff4757;border:1px solid rgba(255,71,87,.2)}
.badge.trial{background:rgba(255,184,0,.1);color:#ffb800;border:1px solid rgba(255,184,0,.2)}
.bdot{width:6px;height:6px;border-radius:50%}
.bdot.ok{background:#00e87a;animation:op 2s infinite}
.bdot.exp{background:#ff4757}.bdot.trial{background:#ffb800;animation:op 2s infinite}
@keyframes op{0%,100%{box-shadow:0 0 0 2px rgba(0,232,122,.2)}50%{box-shadow:0 0 0 6px rgba(0,232,122,0)}}
.days-big{font-size:36px;font-weight:900;line-height:1;font-family:monospace}
.days-lbl{font-size:12px;color:var(--t2)}
.prog-track{height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;margin:14px 0}
.prog-fill{height:100%;border-radius:4px;transition:width .6s}
.prog-fill.hi{background:linear-gradient(90deg,#7c6aff,#00e87a)}
.prog-fill.mid{background:#ffb800}
.prog-fill.lo{background:#ff4757}
.smeta{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:4px}
.smi{background:var(--bg2);border-radius:10px;padding:12px}
.smi-l{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.smi-v{font-size:14px;font-weight:600}
.nolic{text-align:center;padding:44px 24px;background:var(--bg1);border:1px solid var(--b2);border-radius:16px;margin-bottom:14px}
.nolic-ico{font-size:48px;margin-bottom:14px}
.nolic-h{font-size:20px;font-weight:800;margin-bottom:9px}
.nolic-p{font-size:14px;color:var(--t2);margin-bottom:20px;line-height:1.65;max-width:360px;margin-left:auto;margin-right:auto}
.nolic-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.qarow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
.qa{background:var(--bg2);border-radius:12px;padding:18px;text-align:center;cursor:pointer;transition:.2s;border:1px solid transparent;text-decoration:none;color:inherit;display:block}
.qa:hover{background:var(--bg3);border-color:var(--ac);transform:translateY(-2px)}
.qa-ico{font-size:24px;margin-bottom:7px}
.qa-l{font-size:13px;font-weight:600}
.qa-s{font-size:11px;color:var(--t3);margin-top:3px}
.devcard{background:var(--bg2);border-radius:12px;padding:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:8px}
.dev-l{display:flex;align-items:center;gap:12px}
.dev-ico{width:40px;height:40px;background:var(--bg3);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.dev-name{font-size:14px;font-weight:700}
.dev-vid{font-size:11px;color:var(--t3);font-family:monospace;margin-top:3px;word-break:break-all}
.dev-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(0,232,122,.1);color:#00e87a;font-size:10px;font-weight:700;padding:2px 8px;border-radius:40px;margin-top:4px}
.dev-badge.none{background:var(--bg3);color:var(--t3)}
.rst-btn{padding:8px 14px;background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.2);color:#ff4757;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--f);white-space:nowrap}
.rst-btn:hover{background:rgba(255,71,87,.15)}
.rst-btn:disabled{opacity:.4;cursor:not-allowed}
.fg{margin-bottom:14px}
.fl{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px;display:block}
.fi{width:100%;background:var(--bg2);border:1px solid var(--b2);border-radius:9px;padding:11px 14px;color:var(--t1);font-size:15px;outline:none;transition:border-color .15s;font-family:var(--f)}
.fi:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(124,106,255,.12)}
.fi::placeholder{color:var(--t3)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.sbtn{padding:11px 26px;background:linear-gradient(135deg,#7c6aff,#a89fff);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--f);transition:.2s}
.sbtn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,106,255,.35)}
.sbtn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.alert{padding:11px 14px;border-radius:9px;font-size:13px;margin-bottom:14px;display:none}
.alert.show{display:block}
.alert.ok{background:rgba(0,232,122,.1);border:1px solid rgba(0,232,122,.3);color:#00e87a}
.alert.err{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);color:#ff4757}
.relnote{border-left:3px solid var(--b2);padding:0 0 22px 18px;position:relative;margin-left:8px}
.relnote:last-child{padding-bottom:0;border-left-color:transparent}
.reldot{width:12px;height:12px;border-radius:50%;position:absolute;left:-7.5px;top:3px}
.reldot.new{background:var(--ac3)}.reldot.old{background:var(--bg4);border:2px solid var(--b2)}
.relver{font-size:14px;font-weight:700;margin-bottom:2px}
.reldate{font-size:12px;color:var(--t3);margin-bottom:7px}
.reltag{display:inline-block;background:var(--acd);color:var(--ac3);font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;margin-left:7px}
.relnotes{font-size:13px;color:var(--t2);line-height:1.65}
.relnotes ul{padding-left:16px;margin-top:6px}
.relnotes li{margin-bottom:3px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--bg1);border:1px solid var(--b2);border-radius:18px;padding:28px;max-width:420px;width:100%}
.modal h3{font-size:17px;font-weight:800;margin-bottom:8px}
.modal p{font-size:14px;color:var(--t2);line-height:1.65;margin-bottom:22px}
.modal-btns{display:flex;gap:10px;justify-content:flex-end}
.mbtn{padding:10px 20px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--f);border:none}
.mbtn.cancel{background:var(--bg3);color:var(--t2)}.mbtn.cancel:hover{color:var(--t1)}
.mbtn.confirm{background:#ff4757;color:#fff}.mbtn.confirm:hover{opacity:.85}
.spin-wrap{display:flex;align-items:center;justify-content:center;min-height:280px;font-size:15px;color:var(--t3)}
.spin{width:22px;height:22px;border:2px solid var(--b2);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;margin-right:12px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){.smeta{grid-template-columns:1fr 1fr}.fgrid{grid-template-columns:1fr}.qarow{grid-template-columns:1fr 1fr}}
@media(max-width:500px){.qarow{grid-template-columns:1fr}.dtabs{gap:2px}.dtab{padding:8px 12px;font-size:13px}}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--bg1);border:1px solid var(--b2);border-radius:14px;padding:16px;text-align:center;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-card.blue::before{background:linear-gradient(90deg,#7c6aff,#a89fff)}
.stat-card.green::before{background:linear-gradient(90deg,#00e87a,#00c060)}
.stat-card.yellow::before{background:linear-gradient(90deg,#ffb74d,#ff8c00)}
.stat-card.red::before{background:linear-gradient(90deg,#ff4f4f,#cc0000)}
.stat-val{font-size:28px;font-weight:900;letter-spacing:-1px;line-height:1}
.stat-lbl{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-top:4px}
.stat-sub{font-size:11px;color:var(--t2);margin-top:3px}
.tip-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.tip-card{background:var(--bg1);border:1px solid var(--b2);border-radius:12px;padding:14px;display:flex;align-items:flex-start;gap:10px}
.tip-ico{font-size:20px;flex-shrink:0;margin-top:1px}
.tip-title{font-size:13px;font-weight:700;margin-bottom:3px}
.tip-desc{font-size:12px;color:var(--t2);line-height:1.5}
.activity-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--b1)}
.activity-row:last-child{border:none}
.activity-ico{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.activity-title{font-size:13px;font-weight:600}
.activity-sub{font-size:11px;color:var(--t3);margin-top:1px}
.activity-time{font-size:11px;color:var(--t3);margin-left:auto;white-space:nowrap}
.welcome-band{background:linear-gradient(135deg,rgba(124,106,255,0.15),rgba(0,232,122,0.08));border:1px solid rgba(124,106,255,0.25);border-radius:16px;padding:20px 24px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.welcome-band-left h2{font-size:18px;font-weight:800;letter-spacing:-.3px;margin:0 0 4px}
.welcome-band-left p{font-size:13px;color:var(--t2);margin:0}
@media(max-width:600px){.stats-grid{grid-template-columns:1fr 1fr}.tip-grid{grid-template-columns:1fr}}

</style>
</head>
<body>
<script src="js/i18n.js"></script>
<script src="js/shared.js"></script>
<script data-cfasync="false">
const VC_API='https://api.valcrown.com';
const _t=localStorage.getItem('vc_token');
if(!_t||_t.length<10){location.replace('auth.html');}
function getU(){try{return JSON.parse(localStorage.getItem('vc_user')||'{}');}catch(e){return{};}}
function getL(){try{return JSON.parse(localStorage.getItem('vc_license')||'null');}catch(e){return null;}}
function _so(){['vc_token','vc_refresh','vc_email','vc_user','vc_license'].forEach(k=>localStorage.removeItem(k));location.replace('auth.html');}
function signOut(){_so();}
</script>
<script data-cfasync="false">renderNav('')</script>

<div class="dw" id="dw">
  <div class="spin-wrap"><div class="spin"></div>Loading your dashboard...</div>
</div>

<div class="modal-bg" id="reset-modal">
  <div class="modal">
    <h3>Reset Device Binding?</h3>
    <p>Your license will be unbound from your current PC. The next login from any Windows PC will bind it. <strong style="color:var(--yw)">You can only do this once every 30 days.</strong></p>
    <div class="modal-btns">
      <button class="mbtn cancel" onclick="closeModal()">Cancel</button>
      <button class="mbtn confirm" id="confirm-reset" onclick="doReset()">Reset Device</button>
    </div>
  </div>
</div>

<script data-cfasync="false">renderStatusBar();renderFooter();</script>
<script data-cfasync="false">
const token=localStorage.getItem('vc_token');
const email=localStorage.getItem('vc_email')||'';
let userData=getU();
let licData=getL();
let devData=null;

function tab(id){
  document.querySelectorAll('.dtab').forEach(t=>t.classList.toggle('on',t.dataset.t===id));
  document.querySelectorAll('.dpanel').forEach(p=>p.classList.toggle('on',p.id==='dp-'+id));
}

function fmt(d){if(!d)return'Never';return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}
function planLabel(p){return{trial:'3-Day Trial',trial14:'14-Day Trial',monthly:'Monthly',yearly:'Yearly',lifetime:'Lifetime',admin:'Admin'}[p]||p||'Unknown';}
function daysLeft(e){if(!e)return null;const d=new Date(e)-new Date();return Math.max(0,Math.ceil(d/86400000));}

function alert2(id,type,txt){const e=document.getElementById(id);if(!e)return;e.className='alert '+type+' show';e.textContent=txt;setTimeout(()=>e.classList.remove('show'),4000);}

async function apiFetch(url,opts={}){
  return fetch(VC_API+url,{...opts,headers:{'Content-Type':'application/json','Authorization':'Bearer '+token,...(opts.headers||{})}});
}

function buildDash(){
  const name=userData.fullName||userData.full_name||email.split('@')[0]||'Gamer';
  const isAdmin=userData.role==='admin';
  const lic=licData;
  const hasLic=lic&&lic.status==='active';
  const isLifetime=hasLic&&(!lic.expiresAt||lic.plan==='lifetime');
  const days=hasLic&&!isLifetime?daysLeft(lic.expiresAt):null;
  const pct=isLifetime?100:days!=null?Math.min(100,Math.round((days/365)*100)):0;
  const barCls=pct>50?'hi':pct>20?'mid':'lo';
  const stCls=lic?.plan?.includes('trial')?'trial':'ok';

  let licHTML='';
  if(hasLic){
    licHTML=`
    <div class="subcard">
      <div class="plan-row">
        <div><div class="plan-name">${planLabel(lic.plan)}</div><div class="badge ${stCls}"><span class="bdot ${stCls}"></span>${stCls==='trial'?'Trial Active':'Active'}</div></div>
        <div style="text-align:right">${isLifetime?'<div class="days-big" style="color:#00e87a">&infin;</div><div class="days-lbl">Never expires</div>':`<div class="days-big">${days}</div><div class="days-lbl">days left</div>`}</div>
      </div>
      ${!isLifetime&&days!=null?`<div style="font-size:12px;color:var(--t2);margin-bottom:6px">Time remaining</div><div class="prog-track"><div class="prog-fill ${barCls}" style="width:${pct}%"></div></div>`:''}
      <div class="smeta">
        <div class="smi"><div class="smi-l">Plan</div><div class="smi-v">${planLabel(lic.plan)}</div></div>
        <div class="smi"><div class="smi-l">Expires</div><div class="smi-v">${isLifetime?'Never':fmt(lic.expiresAt)}</div></div>
        <div class="smi"><div class="smi-l">Status</div><div class="smi-v" style="color:#00e87a">Active ✓</div></div>
      </div>
    </div>`;
  } else {
    licHTML=`<div class="nolic">
      <div class="nolic-ico">🔑</div>
      <div class="nolic-h">No active license</div>
      <div class="nolic-p">Get a ValCrown license to start boosting. Try free for 3 days — no card needed.</div>
      <div class="nolic-btns">
        <a href="download.html" class="dbtn g">Free 3-Day Trial</a>
        <a href="pricing.html" class="dbtn p">View Plans →</a>
        <a href="auth.html?tab=redeem" class="dbtn g">🔑 Redeem Key</a>
      </div>
    </div>`;
  }

  document.getElementById('dw').innerHTML=`
  <div class="dtop">
    <div><div class="dgreet">Hey, ${name} 👋</div><div class="dsub">${email}</div></div>
    <div class="dtop-btns">
      ${isAdmin?`<a href="https://admin.valcrown.com" class="dbtn p" target="_blank">Admin Panel →</a>`:''}
      <a href="download.html" class="dbtn g">Download App</a>
      <button onclick="signOut()" class="dbtn r">Sign Out</button>
    </div>
  </div>

  <div class="dtabs">
    <button class="dtab on" data-t="overview" onclick="tab('overview')">Overview</button>
    <button class="dtab" data-t="sub" onclick="tab('sub')">Subscription</button>
    <button class="dtab" data-t="device" onclick="tab('device')">Device</button>
    <button class="dtab" data-t="profile" onclick="tab('profile')">Profile</button>
    <button class="dtab" data-t="releases" onclick="tab('releases');loadReleases()">Releases</button>
  </div>

  <!-- OVERVIEW -->
  <div class="dpanel on" id="dp-overview">
    ${licHTML}

    <!-- Welcome band -->
    <div class="welcome-band">
      <div class="welcome-band-left">
        <h2>Welcome back, ${userData.fullName||userData.full_name||email.split('@')[0]} 👋</h2>
        <p>Your ValCrown dashboard — manage your license, device, and account</p>
      </div>
      <a href="download.html" class="dbtn p" style="flex-shrink:0">⬇️ Download App</a>
    </div>

    <!-- Stats grid -->
    <div class="stats-grid" id="overview-stats-grid">
      <div class="stat-card blue">
        <div class="stat-val" id="ov-plan-name">—</div>
        <div class="stat-lbl">Current Plan</div>
        <div class="stat-sub" id="ov-plan-status">Loading...</div>
      </div>
      <div class="stat-card green">
        <div class="stat-val" id="ov-days">—</div>
        <div class="stat-lbl">Days Left</div>
        <div class="stat-sub" id="ov-expiry">Checking...</div>
      </div>
      <div class="stat-card yellow">
        <div class="stat-val" id="ov-device">—</div>
        <div class="stat-lbl">Device</div>
        <div class="stat-sub" id="ov-device-sub">Checking...</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-val">80+</div>
        <div class="stat-lbl">Games Supported</div>
        <div class="stat-sub">Auto-detected</div>
      </div>
    </div>

    <!-- Tips grid -->
    <div class="tip-grid">
      <div class="tip-card">
        <div class="tip-ico">⚡</div>
        <div>
          <div class="tip-title">Activate Boost</div>
          <div class="tip-desc">Launch any supported game and ValCrown auto-boosts. Or set a manual target app for any .exe.</div>
        </div>
      </div>
      <div class="tip-card">
        <div class="tip-ico">🌐</div>
        <div>
          <div class="tip-title">Reduce Ping</div>
          <div class="tip-desc">Open Network page → click DNS Flush + TCP Optimize before your gaming session for best results.</div>
        </div>
      </div>
      <div class="tip-card">
        <div class="tip-ico">🎮</div>
        <div>
          <div class="tip-title">Cloud Gaming</div>
          <div class="tip-desc">ValCrown is optimized for GeForce NOW, Xbox Cloud, Shadow PC and Amazon Luna. Set your client as target.</div>
        </div>
      </div>
      <div class="tip-card">
        <div class="tip-ico">🔄</div>
        <div>
          <div class="tip-title">Stay Updated</div>
          <div class="tip-desc">ValCrown auto-updates silently. Check Settings → Updates in the app to verify you're on the latest version.</div>
        </div>
      </div>
    </div>

    <!-- Quick actions -->
    <div class="dc">
      <div class="dc-h">⚡ Quick Actions</div>
      <div class="qarow">
        <a href="download.html" class="qa"><div class="qa-ico">⬇️</div><div class="qa-l">Download App</div><div class="qa-s">Windows 10/11</div></a>
        <a href="pricing.html" class="qa"><div class="qa-ico">🚀</div><div class="qa-l">${hasLic?'Upgrade Plan':'Get a License'}</div><div class="qa-s">See all plans</div></a>
        <a href="status.html" class="qa"><div class="qa-ico">🟢</div><div class="qa-l">Server Status</div><div class="qa-s">Live health</div></a>
        <a href="contact.html" class="qa"><div class="qa-ico">💬</div><div class="qa-l">Support</div><div class="qa-s">24h response</div></a>
        <a href="auth.html?tab=redeem" class="qa"><div class="qa-ico">🔑</div><div class="qa-l">Redeem Key</div><div class="qa-s">Activate license</div></a>
        <a onclick="tab('profile')" class="qa"><div class="qa-ico">👤</div><div class="qa-l">Edit Profile</div><div class="qa-s">Name &amp; email</div></a>
      </div>
    </div>

    <!-- Recent activity -->
    <div class="dc">
      <div class="dc-h">📋 Account Activity</div>
      <div id="ov-activity">
        <div class="activity-row">
          <div class="activity-ico" style="background:rgba(0,232,122,0.15)">✅</div>
          <div><div class="activity-title">Account created</div><div class="activity-sub">Welcome to ValCrown!</div></div>
          <div class="activity-time" id="ov-created">—</div>
        </div>
        <div class="activity-row">
          <div class="activity-ico" style="background:rgba(124,106,255,0.15)">🎮</div>
          <div><div class="activity-title">Trial license activated</div><div class="activity-sub">3-day free trial started</div></div>
          <div class="activity-time" id="ov-trial-start">—</div>
        </div>
        <div class="activity-row">
          <div class="activity-ico" style="background:rgba(255,183,77,0.15)">💻</div>
          <div><div class="activity-title">Last app login</div><div class="activity-sub" id="ov-device-info">No device bound yet</div></div>
          <div class="activity-time" id="ov-last-seen">Never</div>
        </div>
      </div>
    </div>
  </div>

  <!-- SUBSCRIPTION -->
  <div class="dpanel" id="dp-sub">
    ${licHTML}
    ${hasLic?`<div class="dc">
      <div class="dc-h">💳 Manage Subscription</div>
      <p style="font-size:14px;color:var(--t2);line-height:1.65;margin-bottom:16px">To upgrade, cancel, or update payment details, visit the pricing page or contact support. All billing is handled securely by Stripe.</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <a href="pricing.html" class="dbtn p">Upgrade Plan</a>
        <a href="mailto:support@xogamess.com?subject=Cancel Subscription" class="dbtn g">Cancel Subscription</a>
      </div>
    </div>`:''}
  </div>

  <!-- DEVICE -->
  <div class="dpanel" id="dp-device">
    <div class="alert" id="dev-alert"></div>
    <div class="dc">
      <div class="dc-h">💻 Bound Device</div>
      <div id="dev-content"><div class="spin-wrap" style="min-height:80px"><div class="spin"></div></div></div>
    </div>
    <div class="dc">
      <div class="dc-h">ℹ️ About Device Binding</div>
      <p style="font-size:14px;color:var(--t2);line-height:1.7">Your ValCrown license is locked to one Windows PC. <strong style="color:var(--t1)">You can reset it once every 30 days</strong> — after which the next login binds the new PC. For emergency resets contact <a href="mailto:support@xogamess.com" style="color:var(--ac3)">support@xogamess.com</a>.</p>
    </div>
  </div>

  <!-- PROFILE -->
  <div class="dpanel" id="dp-profile">
    <div class="alert" id="prof-alert"></div>
    <div class="dc">
      <div class="dc-h">👤 Personal Information</div>
      <div class="fgrid">
        <div class="fg"><label class="fl" for="p-nm">Full Name</label><input class="fi" type="text" id="p-nm" placeholder="Your full name" value="${userData.fullName||userData.full_name||''}"></div>
        <div class="fg"><label class="fl" for="p-em">Email Address</label><input class="fi" type="email" id="p-em" placeholder="your@email.com" value="${email}"></div>
      </div>
      <button class="sbtn" id="prof-btn" onclick="saveProfile()">Save Changes</button>
    </div>
    <div class="dc">
      <div class="dc-h">🔒 Change Password</div>
      <div class="alert" id="pw-alert"></div>
      <div class="fg"><label class="fl" for="pw-cur">Current Password</label><input class="fi" type="password" id="pw-cur" placeholder="Current password" autocomplete="current-password"></div>
      <div class="fgrid">
        <div class="fg"><label class="fl" for="pw-new">New Password</label><input class="fi" type="password" id="pw-new" placeholder="8+ characters" autocomplete="new-password"></div>
        <div class="fg"><label class="fl" for="pw-con">Confirm New</label><input class="fi" type="password" id="pw-con" placeholder="Repeat" autocomplete="new-password"></div>
      </div>
      <button class="sbtn" id="pw-btn" onclick="changePw()">Update Password</button>
    </div>
    <div class="dc" style="border-color:rgba(255,71,87,.2)">
      <div class="dc-h" style="color:#ff4757">⚠️ Danger Zone</div>
      <p style="font-size:14px;color:var(--t2);margin-bottom:14px">Permanently delete your account and all data. Cannot be undone.</p>
      <button onclick="delAcc()" class="dbtn r">Delete Account</button>
    </div>
  </div>

  <!-- RELEASES -->
  <div class="dpanel" id="dp-releases">
    <div class="dc">
      <div class="dc-h" style="justify-content:space-between">
        🚀 What's New
        <span id="rel-latest-badge" style="background:rgba(0,232,122,0.15);color:#00e87a;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700">Loading...</span>
      </div>
      <div id="rel-list"><div style="text-align:center;padding:20px;color:var(--t3);font-size:13px">Loading releases from GitHub...</div></div>
      <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--b1);text-align:center">
        <a href="https://github.com/xogamesltd/valcrown-app/releases" target="_blank" rel="noopener" style="color:var(--ac3);font-size:13px">View all releases on GitHub →</a>
      </div>
    </div>
    <div class="dc">
      <div class="dc-h">🔮 Coming Soon</div>
      <div class="relnotes"><ul>
        <li>🎮 500+ game database expansion</li>
        <li>📱 Mobile companion app (Android + iOS)</li>
        <li>🤖 Smart auto-boost — detects game launch and boosts instantly</li>
        <li>📊 Weekly performance reports via email</li>
        <li>🌍 Multi-language support (Hindi, Spanish, Portuguese)</li>
        <li>⚙️ Per-game boost profiles with custom settings</li>
      </ul></div>
    </div>
  </div>`;

  loadDevice();
  loadOverviewStats();
}


async function loadOverviewStats() {
  try {
    const d = await apiFetch('/api/auth/me');
    if (!d) return;

    // Plan name
    const plan = d.license?.plan || 'none';
    const planNames = { trial:'Trial', monthly:'Monthly', yearly:'Yearly', lifetime:'Lifetime', none:'No License' };
    document.getElementById('ov-plan-name').textContent = planNames[plan] || plan;

    // Days left
    if (plan === 'lifetime') {
      document.getElementById('ov-days').textContent = '∞';
      document.getElementById('ov-expiry').textContent = 'Never expires';
      document.getElementById('ov-plan-status').textContent = 'Active · Lifetime';
    } else if (d.license?.expires_at) {
      const exp = new Date(d.license.expires_at);
      const days = Math.ceil((exp - Date.now()) / 86400000);
      document.getElementById('ov-days').textContent = days > 0 ? days : '0';
      document.getElementById('ov-expiry').textContent = days > 0 ? 'Expires ' + exp.toLocaleDateString() : 'Expired';
      document.getElementById('ov-plan-status').textContent = days > 0 ? 'Active' : 'Expired';
      // Color based on days
      const card = document.getElementById('ov-days').closest('.stat-card');
      if (card) { card.className = 'stat-card ' + (days > 7 ? 'green' : days > 0 ? 'yellow' : 'red'); }
    } else {
      document.getElementById('ov-days').textContent = '—';
      document.getElementById('ov-expiry').textContent = 'No active license';
      document.getElementById('ov-plan-status').textContent = 'Inactive';
    }

    // Device
    if (d.deviceVid) {
      document.getElementById('ov-device').textContent = '1';
      document.getElementById('ov-device-sub').textContent = 'Device bound';
    } else {
      document.getElementById('ov-device').textContent = '0';
      document.getElementById('ov-device-sub').textContent = 'No device yet';
    }

    // Activity timestamps
    if (d.createdAt || d.created_at) {
      document.getElementById('ov-created').textContent = new Date(d.createdAt || d.created_at).toLocaleDateString();
      document.getElementById('ov-trial-start').textContent = new Date(d.createdAt || d.created_at).toLocaleDateString();
    }
    if (d.lastSeen) {
      document.getElementById('ov-last-seen').textContent = new Date(d.lastSeen).toLocaleString();
    }
    if (d.osVersion || d.os_version) {
      document.getElementById('ov-device-info').textContent = d.osVersion || d.os_version;
    }
  } catch(e) {}
}


async function loadReleases() {
  try {
    const res = await fetch('https://api.github.com/repos/xogamesltd/valcrown-app/releases?per_page=5', {
      headers: { 'Accept': 'application/vnd.github.v3+json' }
    });
    const releases = await res.json();
    if (!Array.isArray(releases) || !releases.length) return;

    const latest = releases[0];
    const badge = document.getElementById('rel-latest-badge');
    if (badge) badge.textContent = 'Latest: ' + latest.tag_name;

    const container = document.getElementById('rel-list');
    if (!container) return;

    const html = releases.map(function(r, i) {
      const date = new Date(r.published_at).toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'});
      const asset = (r.assets||[]).find(function(a){ return a.name.endsWith('.exe'); });
      const size = asset ? ' · ' + (asset.size/1024/1024).toFixed(1) + ' MB' : '';
      const body = r.body || '';
      const bullets = body.split('\n')
        .filter(function(l){ return l.trim().startsWith('-') || l.trim().startsWith('*'); })
        .slice(0,6)
        .map(function(l){ return '<li>' + l.replace(/^[-*]\s*/,'') + '</li>'; })
        .join('');
      const dlBtn = (i===0 && asset)
        ? '<a href="' + asset.browser_download_url + '" style="display:inline-flex;align-items:center;gap:6px;margin-top:10px;background:rgba(124,106,255,0.15);border:1px solid rgba(124,106,255,0.3);color:#7c6aff;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:700;text-decoration:none">⬇️ Download ' + r.tag_name + '</a>'
        : '';
      const latest_tag = i===0 ? ' <span class="reltag">Latest</span>' : '';
      const mt = i>0 ? ' style="margin-top:14px"' : '';
      return '<div class="relnote"' + mt + '>' +
        '<div class="reldot ' + (i===0?'new':'') + '"></div>' +
        '<div class="relver">' + r.tag_name + ' — ' + (r.name||r.tag_name) + latest_tag + '</div>' +
        '<div class="reldate">' + date + size + '</div>' +
        (bullets ? '<div class="relnotes"><ul>' + bullets + '</ul></div>' : '') +
        dlBtn +
        '</div>';
    }).join('');

    container.innerHTML = html;
  } catch(e) {
    const c = document.getElementById('rel-list');
    if (c) c.innerHTML = '<div style="color:var(--t3);font-size:13px;text-align:center;padding:16px">Could not load — <a href="https://github.com/xogamesltd/valcrown-app/releases" target="_blank" style="color:#7c6aff">view on GitHub</a></div>';
  }
}

async function loadDevice(){
  try{
    const r=await apiFetch('/api/auth/device',{method:'GET'});
    if(r.ok){devData=await r.json();}
  }catch(e){}
  renderDevice();
}

function renderDevice(){
  const el=document.getElementById('dev-content');
  if(!el)return;
  const d=devData;
  const lastReset=d?.lastReset||d?.last_reset;
  const daysSince=lastReset?Math.floor((Date.now()-new Date(lastReset))/86400000):999;
  const canReset=daysSince>=30;
  const daysUntil=Math.max(0,30-daysSince);
  el.innerHTML=`
  <div class="devcard">
    <div class="dev-l">
      <div class="dev-ico">🖥️</div>
      <div>
        <div class="dev-name">${d?.deviceName||d?.device_name||'Windows PC'}</div>
        <div class="dev-vid">VID: ${d?.deviceVid||d?.device_vid||'Not bound yet'}</div>
        <div class="dev-badge ${d?'ok':'none'}">${d?'● Active device':'○ No device bound'}</div>
      </div>
    </div>
    <div>
      <button class="rst-btn" onclick="openModal()" ${!canReset||!d?'disabled':''}>
        ${canReset?'Reset Device':'Reset in '+daysUntil+'d'}
      </button>
      <div style="font-size:11px;margin-top:5px;color:${canReset?'#00e87a':'#ffb800'}">${canReset?'✓ Available now':'⏳ '+daysUntil+' days until next reset'}</div>
    </div>
  </div>
  <div style="font-size:12px;color:var(--t3);padding:10px 12px;background:var(--bg2);border-radius:8px">
    Last seen: ${d?.lastSeen?new Date(d.lastSeen).toLocaleString():'Never'} · OS: ${d?.osVersion||d?.os_version||'Unknown'} · App: ${d?.appVersion||d?.app_version||'Not installed'}
  </div>`;
}

function openModal(){document.getElementById('reset-modal').classList.add('open');}
function closeModal(){document.getElementById('reset-modal').classList.remove('open');}

async function doReset(){
  const btn=document.getElementById('confirm-reset');
  btn.disabled=true;btn.textContent='Resetting...';
  try{
    const r=await apiFetch('/api/auth/reset-device',{method:'POST',body:JSON.stringify({confirm:true})});
    const d=await r.json().catch(()=>({}));
    closeModal();
    if(r.ok){alert2('dev-alert','ok','✓ Device reset. Your next login will bind a new device.');devData=null;renderDevice();}
    else{alert2('dev-alert','err',d.error||'Reset failed. Please try again or contact support.');}
  }catch(e){closeModal();alert2('dev-alert','err','Cannot connect. Please try again.');}
  btn.disabled=false;btn.textContent='Reset Device';
}

async function saveProfile(){
  const nm=document.getElementById('p-nm').value.trim();
  const em=document.getElementById('p-em').value.trim().toLowerCase();
  const btn=document.getElementById('prof-btn');
  btn.disabled=true;btn.textContent='Saving...';
  try{
    const r=await apiFetch('/api/auth/update-profile',{method:'POST',body:JSON.stringify({fullName:nm,email:em})});
    const d=await r.json().catch(()=>({}));
    if(r.ok){if(nm){userData.fullName=nm;localStorage.setItem('vc_user',JSON.stringify(userData));}if(em!==email)localStorage.setItem('vc_email',em);alert2('prof-alert','ok','✓ Profile updated.');}
    else{alert2('prof-alert','err',d.error||'Update failed.');}
  }catch(e){alert2('prof-alert','err','Cannot connect.');}
  btn.disabled=false;btn.textContent='Save Changes';
}

async function changePw(){
  const cur=document.getElementById('pw-cur').value;
  const nw=document.getElementById('pw-new').value;
  const con=document.getElementById('pw-con').value;
  if(!cur||!nw){alert2('pw-alert','err','Please fill in all password fields.');return;}
  if(nw.length<8){alert2('pw-alert','err','New password must be at least 8 characters.');return;}
  if(nw!==con){alert2('pw-alert','err','New passwords do not match.');return;}
  const btn=document.getElementById('pw-btn');
  btn.disabled=true;btn.textContent='Updating...';
  try{
    const r=await apiFetch('/api/auth/change-password',{method:'POST',body:JSON.stringify({currentPassword:cur,newPassword:nw})});
    const d=await r.json().catch(()=>({}));
    if(r.ok){alert2('pw-alert','ok','✓ Password updated successfully.');document.getElementById('pw-cur').value='';document.getElementById('pw-new').value='';document.getElementById('pw-con').value='';}
    else{alert2('pw-alert','err',d.error||'Password change failed.');}
  }catch(e){alert2('pw-alert','err','Cannot connect.');}
  btn.disabled=false;btn.textContent='Update Password';
}

async function delAcc(){
  if(!confirm('Permanently delete your account and all data? This cannot be undone.'))return;
  try{await apiFetch('/api/auth/delete-account',{method:'DELETE'});signOut();}
  catch(e){alert('Could not delete account. Please email support@xogamess.com');}
}

// Init — show dash immediately with cached data, refresh in background
(async function init(){
  buildDash();

  // Background refresh
  try{
    const r=await apiFetch('/api/auth/validate',{method:'POST',body:JSON.stringify({deviceVid:'WEB-DASHBOARD'})});
    if(r.status===401){const d=await r.json().catch(()=>({}));if(d.code==='INVALID_TOKEN'||d.code==='TOKEN_EXPIRED')signOut();return;}
    if(r.ok){
      const d=await r.json().catch(()=>({}));
      if(d.plan){licData={plan:d.plan,status:'active',expiresAt:d.expiresAt};localStorage.setItem('vc_license',JSON.stringify(licData));}
      if(d.user){userData={...userData,...d.user};localStorage.setItem('vc_user',JSON.stringify(userData));}
      buildDash();
    }
  }catch(e){}
})();

document.getElementById('reset-modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
</script>
<script src="js/analytics.js"></script>
</body>
</html>
