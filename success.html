<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ValCrown — Payment Successful</title>
<link rel="icon" type="image/svg+xml" href="img/favicon.svg">
<link rel="stylesheet" href="css/shared.css"></head>
<body>
<script src="js/i18n.js"></script>
<script src="js/shared.js"></script>
<script>renderNav()</script>
<div style="text-align:center;padding:80px 24px;max-width:600px;margin:0 auto">
  <div style="font-size:72px;margin-bottom:24px">🎉</div>
  <h1 style="font-size:36px;font-weight:900;letter-spacing:-1px;margin-bottom:12px">Payment Successful!</h1>
  <p style="font-size:16px;color:var(--t2);margin-bottom:32px;line-height:1.7">Your ValCrown license is ready. Your key will also be sent to your email.</p>
  <div style="background:var(--bg1);border:1px solid var(--b2);border-radius:16px;padding:28px;margin-bottom:32px">
    <div style="font-size:12px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px">Your License Key</div>
    <div id="license-key" style="font-family:monospace;font-size:18px;font-weight:700;color:var(--ac3);letter-spacing:2px;padding:14px;background:var(--bg2);border-radius:10px;cursor:pointer" onclick="copyKey()">Loading...</div>
    <div style="font-size:12px;color:var(--t3);margin-top:8px">Click to copy · Also sent to your email</div>
  </div>
  <a href="download.html" class="bh" style="display:inline-block">⬇ Download ValCrown Now</a>
</div>

<script>
const params=new URLSearchParams(window.location.search);
const sid=params.get('session_id');
if(sid&&!sid.startsWith('free-')){
  fetch('https://api.valcrown.com/api/stripe/session-key?session_id='+sid)
    .then(r=>r.json()).then(d=>{
      const el=document.getElementById('license-key');
      if(d.licenseKey){el.textContent=d.licenseKey;}
      else{el.textContent='Check your email for your license key';el.style.fontSize='14px';}
    }).catch(()=>{document.getElementById('license-key').textContent='Check your email for your license key';});
}else if(sid&&sid.startsWith('free-')){
  document.getElementById('license-key').textContent=sid.replace('free-','');
}
function copyKey(){
  const t=document.getElementById('license-key').textContent;
  navigator.clipboard.writeText(t).then(()=>{document.getElementById('license-key').textContent='Copied!';setTimeout(()=>location.reload(),1500);});
}
</script>
<script>renderStatusBar();renderFooter()</script>
<script src="js/analytics.js"></script>
</body></html>
