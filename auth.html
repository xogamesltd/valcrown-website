<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ValCrown — Sign In</title>
<link rel="icon" type="image/svg+xml" href="img/favicon.svg">
<link rel="stylesheet" href="css/shared.css">
</head>
<body>
<script src="js/shared.js"></script>
<script>renderNav()</script>
<div class="auth-pg">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-ico">V</div>
      <div class="auth-title">ValCrown</div>
      <div class="auth-subt" id="auth-sub">Sign in to your account</div>
    </div>
    <div class="atabs">
      <button class="atab active" onclick="switchTab('login')">Sign In</button>
      <button class="atab" onclick="switchTab('register')">Create Account</button>
    </div>
    <div class="ferr" id="auth-err"></div>
    <div class="fok" id="auth-ok"></div>
    <div class="fgrp" id="name-grp" style="display:none"><label class="flbl">Full Name</label><input class="finp" type="text" id="fullName" placeholder="Your name"></div>
    <div class="fgrp"><label class="flbl">Email</label><input class="finp" type="email" id="email" placeholder="your@email.com"></div>
    <div class="fgrp"><label class="flbl">Password</label><input class="finp" type="password" id="password" placeholder="Minimum 8 characters"></div>
    <button class="abtn" id="auth-btn" onclick="doAuth()">Sign In</button>
    <div class="aft">No account? <a onclick="switchTab('register')" id="sw">Create one free →</a></div>
  </div>
</div>
<script>
const API='https://api.valcrown.com';let mode='login';
function switchTab(m){
  mode=m;
  document.querySelectorAll('.atab').forEach((t,i)=>t.classList.toggle('active',(m==='login'&&i===0)||(m==='register'&&i===1)));
  document.getElementById('name-grp').style.display=m==='register'?'block':'none';
  document.getElementById('auth-sub').textContent=m==='login'?'Sign in to your account':'Create your free account';
  document.getElementById('auth-btn').textContent=m==='login'?'Sign In':'Create Account';
  document.getElementById('sw').textContent=m==='login'?'Create one free →':'Sign in →';
  document.getElementById('sw').onclick=()=>switchTab(m==='login'?'register':'login');
}
async function doAuth(){
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  const err=document.getElementById('auth-err');const ok=document.getElementById('auth-ok');
  err.classList.remove('show');ok.classList.remove('show');
  if(!email||!password){err.textContent='Please fill in all fields.';err.classList.add('show');return;}
  const btn=document.getElementById('auth-btn');btn.disabled=true;btn.textContent='Please wait...';
  try{
    const body={email,password,deviceVid:'WEB-'+Date.now()};
    if(mode==='register'){const n=document.getElementById('fullName').value.trim();if(n)body.fullName=n;}
    const res=await fetch(API+(mode==='login'?'/api/auth/login':'/api/auth/register'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data=await res.json();
    if(res.ok&&mode==='register'){ok.textContent='Account created! You can now sign in.';ok.classList.add('show');switchTab('login');}
    else if(res.ok&&data.accessToken){localStorage.setItem('vc_token',data.accessToken);localStorage.setItem('vc_user_email',email);window.location.href='index.html';}
    else{err.textContent=data.error||'Authentication failed.';err.classList.add('show');}
  }catch(e){err.textContent='Cannot connect. Please try again.';err.classList.add('show');}
  btn.disabled=false;btn.textContent=mode==='login'?'Sign In':'Create Account';
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doAuth()});
</script>
</body></html>
